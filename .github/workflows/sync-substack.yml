name: Sync Substack posts

on:
  schedule:
    # 01:00 UTC every Monday = 08:00 Monday in Hanoi (UTC+7).
    # Reliably catches a post published any time the previous Sunday.
    - cron: "0 1 * * 1"
  workflow_dispatch: {}

concurrency:
  group: sync-substack
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync Substack feed
        run: npm run sync:substack

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- data/substack-posts.json; then
            echo "No Substack changes — nothing to commit."
            exit 0
          fi
          git config user.name "ducminhngo871"
          git config user.email "ducminhngo871@gmail.com"
          git add data/substack-posts.json
          git commit -m "Sync latest Substack posts"
          git push origin HEAD:main
